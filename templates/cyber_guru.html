{% extends 'base.html' %}
{% load static %}

{% block title %}Cyber Guru - AI Security Assistant{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-12">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">Cyber Guru - Your AI Security Assistant</h3>
                </div>
                <div class="card-body">
                    <div class="chat-container" style="height: 400px; overflow-y: auto; margin-bottom: 20px;">
                        <div id="chat-messages">
                            <!-- Messages will be added here dynamically -->
                        </div>
                    </div>
                    <div class="input-group">
                        <input type="text" id="user-input" class="form-control" placeholder="Ask Cyber Guru about cybersecurity...">
                        <div class="input-group-append">
                            <button class="btn btn-primary" id="send-button">Send</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .chat-container {
        border: 1px solid #ddd;
        border-radius: 5px;
        padding: 10px;
    }
    .message {
        margin-bottom: 10px;
        padding: 10px;
        border-radius: 5px;
    }
    .user-message {
        background-color: #e9f5ff;
        margin-left: 20%;
    }
    .guru-message {
        background-color: #f8f9fa;
        margin-right: 20%;
    }
    .guru-message .emoji-header {
        font-size: 1.5em;
        text-align: center;
        margin-bottom: 10px;
    }
</style>

{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');

        function addMessage(message, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'guru-message'}`;
            
            if (!isUser) {
                // Convert \n to <br> for proper line breaks
                messageDiv.innerHTML = message.replace(/\n/g, '<br>');
            } else {
                messageDiv.textContent = message;
            }
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Add user message to chat
            addMessage(message, true);
            userInput.value = '';

            try {
                const response = await fetch('/chat-with-guru/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                if (data.status === 'success') {
                    addMessage(data.response);
                } else {
                    addMessage('Sorry, I encountered an error. Please try again later.');
                }
            } catch (error) {
                addMessage('Sorry, I encountered an error. Please try again later.');
            }
        }

        sendButton.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Function to get CSRF token
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    });
</script>
{% endblock %}
