{% extends 'base.html' %}
{% load static %}

{% block title %}Settings - Cyber Threat Detection{% endblock %}

{% block extra_css %}
<style>
    .settings-container {
        max-width: 800px;
        margin: 50px auto;
        padding: 20px;
    }
    .settings-card {
        background: var(--card-bg);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid var(--border-color);
        border-radius: 15px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        padding: 30px;
    }
    .settings-header {
        text-align: center;
        margin-bottom: 30px;
    }
    .settings-header i {
        font-size: 4em;
        color: #3498db;
        margin-bottom: 15px;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-label {
        font-weight: bold;
        color: var(--text-color);
        margin-bottom: 8px;
    }
    .form-control {
        background-color: rgba(255, 255, 255, 0.1);
        color: var(--text-color);
        border-radius: 8px;
        padding: 12px;
        border: 1px solid var(--border-color);
    }
    [data-theme="dark"] .form-control {
        background-color: rgba(0, 0, 0, 0.2);
    }
    .form-control:focus {
        background-color: rgba(255, 255, 255, 0.15);
        color: var(--text-color);
        border-color: #3498db;
        box-shadow: 0 0 0 0.2rem rgba(52, 152, 219, 0.25);
    }
    .btn-save {
        background: linear-gradient(45deg, #2c3e50, #3498db);
        border: none;
        padding: 12px 30px;
        border-radius: 8px;
        color: white;
        transition: transform 0.3s ease;
    }
    .btn-save:hover {
        transform: translateY(-2px);
        color: white;
    }
    .settings-section {
        margin-bottom: 30px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--border-color);
    }
    .settings-section:last-child {
        border-bottom: none;
    }
    .section-title {
        color: var(--text-color);
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 2px solid #3498db;
    }
</style>
{% endblock %}

{% block content %}
<div class="settings-container">
    <div class="settings-card">
        <div class="settings-header">
            <i class="fas fa-cogs"></i>
            <h2>Account Settings</h2>
        </div>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="settings-section">
                <h3 class="section-title">Profile Information</h3>
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" value="{{ user.username }}" disabled>
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" value="{{ user.email|default:'' }}" placeholder="Enter your email">
                </div>
            </div>

            <div class="settings-section">
                <h3 class="section-title">Password Change</h3>
                <div class="form-group">
                    <label class="form-label">Current Password</label>
                    <input type="password" name="current_password" class="form-control" placeholder="Enter current password">
                </div>
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input type="password" name="new_password1" class="form-control" placeholder="Enter new password">
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm New Password</label>
                    <input type="password" name="new_password2" class="form-control" placeholder="Confirm new password">
                </div>
            </div>

            <div class="settings-section">
                <h3 class="section-title">Notification Preferences</h3>
                <div class="form-group">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="email_notifications" name="email_notifications" checked>
                        <label class="form-check-label" for="email_notifications">Email Notifications</label>
                    </div>
                </div>
                <div class="form-group">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="threat_alerts" name="threat_alerts" checked>
                        <label class="form-check-label" for="threat_alerts">Threat Alerts</label>
                    </div>
                </div>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-save">
                    <i class="fas fa-save me-2"></i>Save Changes
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
